# =====================================================
# Nginx 설정 - VM4 (DMZ 존)
# 역할: HTTPS 종단 + Reverse Proxy + 정적 파일 서빙
# =====================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── HTTPS 서버 ───────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;   # 도메인 없을 경우 IP로 접근

        # SSL 인증서 (자체서명 인증서 경로)
        # 생성 방법: scripts/gen-ssl.sh 참고
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # ── 정적 프론트엔드 서빙 ─────────────────────────────
        location / {
            root /var/www/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ── API 요청 → K8s 백엔드로 Reverse Proxy ───────────
        # K8s Ingress 또는 NodePort IP로 전달
        # 파트2/3 담당자가 K8s 노드 IP 확정 후 변경
        location /api/ {
            proxy_pass         http://192.168.20.10:30080/;  # ← K8s NodePort IP:Port
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ── HTTP → HTTPS 리다이렉트 ──────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }
}
