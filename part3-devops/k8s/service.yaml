apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: default
spec:
  # ClusterIP: 클러스터 내부에서만 접근 가능
  # 외부 트래픽은 파트1(Nginx)에서 이 서비스로 프록시
  type: ClusterIP
  selector:
    app: backend         # Deployment의 파드 라벨과 일치
  ports:
    - protocol: TCP
      port: 80           # 서비스 포트 (Nginx에서 이 포트로 요청)
      targetPort: 8000   # 컨테이너 포트
