apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend          # 위 deployment.yaml의 이름과 일치

  minReplicas: 2           # 평상시 최소 파드 수
  maxReplicas: 10          # 트래픽 폭증 시 최대 파드 수

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # CPU 사용률이 50% 넘으면 파드 추가
          # JMeter 부하 테스트 시 이 값을 기준으로 스케일아웃 시현
          averageUtilization: 50
