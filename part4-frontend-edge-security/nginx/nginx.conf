# =====================================================
# Nginx 설정 - VM4 (192.168.10.10)
# 역할: HTTPS 종단 + Reverse Proxy + Rate Limiting + 정적 파일 서빙
# =====================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Rate Limiting 정의 ───────────────────────────────────────
    # 클라이언트 IP 기준, 초당 10req 제한
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # 전체 사이트 기준, 초당 30req 제한
    limit_req_zone $binary_remote_addr zone=site_limit:10m rate=30r/s;

    # ── 로그 포맷 ────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── HTTPS 서버 ───────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        # SSL 인증서 (scripts/gen-ssl.sh 로 생성)
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── 정적 프론트엔드 서빙 ─────────────────────────────────
        location / {
            limit_req zone=site_limit burst=50 nodelay;

            root /var/www/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ── API 요청 → K8s 백엔드로 Reverse Proxy ────────────────
        location /api/ {
            # Rate Limiting: 초당 10req, 최대 버스트 20req
            # 초과 시 429 Too Many Requests 반환
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass         http://192.168.20.10:30080/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # 타임아웃 설정
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }
    }

    # ── HTTP → HTTPS 리다이렉트 ──────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }
}
